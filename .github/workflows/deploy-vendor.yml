name: Build and Deploy Vendor Dashboard to Cloud Run

on:
  push:
    branches:
      - master # Trigger on merges to the master branch
    paths:
      - 'apps/vendor-dashboard/**'
      - '.github/workflows/deploy-vendor.yml'
      - 'Dockerfile'

env:
  PROJECT_ID: project-c7935439-18b8-4d29-bb0
  REGION: us-central1
  REPO_NAME: vendor-dashboard-repo
  SERVICE_NAME: vendor-dashboard
  
  # This comes from the GCP Workload Identity Federation setup
  WORKLOAD_IDENTITY_PROVIDER: projects/1054090433298/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
  SERVICE_ACCOUNT: github-actions-deployer@project-c7935439-18b8-4d29-bb0.iam.gserviceaccount.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Required permissions for Workload Identity Federation to securely mint tokens
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Authenticate securely to Google Cloud without long-lived keys
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          # Pass the APP_NAME build arg to tell Docker to build vendor-dashboard
          docker build -t $IMAGE_URL --build-arg APP_NAME=${{ env.SERVICE_NAME }} .
            
          docker push $IMAGE_URL

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          # Allow unauthenticated traffic since this is a public dashboard
          flags: '--allow-unauthenticated'
          
      - name: Show Output URL
        run: echo "Successfully deployed to ${{ steps.deploy.outputs.url }}"
