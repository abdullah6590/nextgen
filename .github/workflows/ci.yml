name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    # This ensures that if ROOT isn't set yet, we default to eshop
    defaults:
      run:
        working-directory: .

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: eshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: apache/kafka:3.7.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        ports:
          - 9092:9092
        options: >-
          --health-cmd "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/eshop?schema=public
      MONGODB_URI: mongodb://localhost:27017/eshop_products
      JWT_SECRET: ci-test-secret
      NX_CLOUD_ACCESS_TOKEN: ${{ github.ref == 'refs/heads/master' && 'YjljMTA2ZjYtZTc4OS00NDhmLTlkMmEtMDg4NTQzODEwMzE1fHJlYWQtd3JpdGU=' || 'NzU5MjVkOTktMWNlNS00YmMxLTg3N2ItNjRkNzcyYTcyMGM1fHJlYWQ=' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Checkout
        run: |
          echo "Working dir: $(pwd)"
          echo "Files found: $(ls | wc -l)"
          ls -la
          test -f nx.json || (echo "ERROR: nx.json not found - checkout may have failed!" && exit 1)
          echo "Checkout OK - nx.json found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Verify Nx Binary
        run: npx nx@22.6.0 --version

      - name: Generate Prisma Clients
        run: npx nx@22.6.0 run-many -t generate-client

      - name: Run Prisma Migrations
        run: |
          cd apps/auth-service && npx prisma migrate deploy && cd $GITHUB_WORKSPACE
          cd apps/order-service && npx prisma migrate deploy && cd $GITHUB_WORKSPACE

      - name: Build, Typecheck, Lint & Unit Tests
        run: npx nx@22.6.0 run-many -t lint test build typecheck --exclude='*-e2e'

      - name: Start Services for E2E Tests
        run: |
          npx nx@22.6.0 run auth-service:serve &
          npx nx@22.6.0 run product-service:serve &
          npx nx@22.6.0 run order-service:serve &
          npx nx@22.6.0 run api-gateway:serve &
          sleep 60

      - name: Run E2E Tests
        run: npx nx@22.6.0 run-many -t e2e

      - name: CI Diagnostics
        if: always()
        continue-on-error: true
        run: |
          echo "=== Working Directory ==="
          pwd
          echo "=== Root Files ==="
          ls -la
          echo "=== nx.json ==="
          cat nx.json 2>/dev/null || echo "nx.json NOT FOUND"
          echo "=== node_modules/nx exists ==="
          test -d node_modules/nx && echo "YES" || echo "NO - npm ci may have failed"
          echo "=== Running nx report ==="
          npx nx@22.6.0 report

      - name: Nx Cloud Self-Healing CI
        if: always()
        continue-on-error: true
        run: npx nx@22.6.0 fix-ci
