name: CI

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: eshop
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      kafka:
        image: bitnami/kafka:3.6.0
        env:
          KAFKA_CFG_NODE_ID: 1
          KAFKA_CFG_PROCESS_ROLES: broker,controller
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          ALLOW_PLAINTEXT_LISTENER: 'yes'
        ports:
          - 9092:9092
        options: >-
          --health-cmd "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/eshop?schema=public
      MONGODB_URI: mongodb://localhost:27017/eshop_products
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Debug Workspace Structure
        run: |
          echo "Current Path: $(pwd)"
          ls -F
          if [ -f "nx.json" ]; then echo "nx.json found"; else echo "nx.json NOT found"; fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: npm ci

      - name: Verify Nx Binary
        run: |
          ./node_modules/.bin/nx --version
          npx nx --version

      - name: Generate Prisma Clients
        run: npx nx run-many -t generate-client

      - name: Run Prisma Migrations
        run: |
          npx prisma migrate deploy --schema=apps/auth-service/prisma/schema.prisma
          npx prisma migrate deploy --schema=apps/order-service/prisma/schema.prisma

      - name: Build, Typecheck, Lint & Unit Tests
        run: npx nx run-many -t lint test build typecheck --exclude='*-e2e'

      - name: Start Services for E2E Tests
        run: |
          npx nx run auth-service:serve &
          npx nx run product-service:serve &
          npx nx run order-service:serve &
          npx nx run api-gateway:serve &
          sleep 15

      - name: Run E2E Tests
        run: npx nx run-many -t e2e

      - run: npx nx fix-ci
        if: always()
