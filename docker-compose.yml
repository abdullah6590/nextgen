services:
  eshop-mongo:
    image: mongo:latest
    container_name: eshop-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  eshop-postgres:
    image: postgres:15
    container_name: eshop-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eshop_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  eshop-redis:
    image: redis:alpine
    container_name: eshop-redis
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mongo_data:
  postgres_data:
